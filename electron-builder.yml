
appId: com.jiancai.manager
productName: 折柳建材管理系统
copyright: Copyright © 2024
directories:
  output: release-v4
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - package.json
  - node_modules/**/*
  - node_modules/.prisma/**/*
extraResources:
  - from: prisma
    to: prisma
    filter:
      - schema.prisma
      - dev.db
  - from: photos
    to: photos
    filter:
      - "**/*"
asar: false
compression: maximum
win:
  target:
    - portable
  signingHashAlgorithms:
    - sha256
  signAndEditExecutable: false
portable:
  artifactName: 折柳建材管理系统-${version}-portable.exe
  unpackDirName: 折柳建材管理系统
protocols:
  name: jiancai
  schemes:
    - jiancai
